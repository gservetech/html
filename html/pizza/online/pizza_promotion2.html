<!DOCTYPE html>
<html lang="en-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Royal King BOGO: 2 Large Pizzas for $29.99">
    <meta property="og:description" content="TAP TO VIEW DEAL: 2 Large Pizzas, 2 Toppings, 2 Pops, and 1 Dip at Royal King Toronto.">
    <meta property="og:image" content="https://gservetech.github.io/html/html/pizza/Pizzeria.jpg">
    <meta property="og:image:secure_url" content="https://gservetech.github.io/html/html/pizza/Pizzeria.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="800">
    <meta property="og:url" content="https://gservetech.github.io/html/html/pizza/online/pizza_promotion2.html">
    <meta property="og:type" content="website">

    <title>Buy 1 Get 1 Free | Royal King Restaurant Toronto</title>

    <style>
        :root {
            --rk-red: #e62117;
            --rk-dark: #1a1a1a;
            --rk-cream: #fff9f0;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--rk-cream);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .clickable-wrapper {
            text-decoration: none;
            color: inherit;
            display: block;
            cursor: pointer;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        .promo-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            transition: transform 0.2s ease;
            text-align: center;
        }

        .promo-container:hover {
            transform: translateY(-5px);
        }

        .promo-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .details {
            padding: 30px 20px 10px;
        }

        .details h2 { 
            color: var(--rk-red); 
            font-size: 2.2rem; 
            margin: 0 0 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .details p { 
            font-size: 1.3rem; 
            line-height: 1.4; 
            margin: 5px 0;
            font-weight: 600;
            color: #333;
        }

        .cta-mimic {
            background-color: var(--rk-red);
            color: white;
            padding: 25px 20px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .cta-mimic .main-btn {
            display: block;
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cta-mimic .contact-line {
            display: block;
            font-size: 1rem;
            opacity: 0.9;
            font-weight: 400;
            line-height: 1.4;
        }

        .tap-hint {
            margin-top: 15px;
            color: #888;
            font-style: italic;
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            .details h2 { font-size: 1.7rem; }
            .details p { font-size: 1.1rem; }
            .cta-mimic .main-btn { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <a href="https://www.royalkingon.com/offers/buy-one-get-one" class="clickable-wrapper">
        <div class="promo-container">
            <img src="https://gservetech.github.io/html/html/pizza/Pizzeria.jpg" 
                 alt="Buy 1 Get 1 Free Pizza Deal" 
                 class="promo-image">
            
            <div class="details">
                <h2>BOGO PIZZA DEAL</h2>
                <p>2 LARGE PIZZAS + 2 TOPPINGS</p>
                <p>2 Pops & 1 Dip — Only $29.99</p>
            </div>

            <div class="cta-mimic">
                <span class="main-btn">ORDER ONLINE NOW</span>
                <span class="contact-line">
                    3450 Bathurst Street, Toronto • 416-781-8383<br>
                    www.royalkingon.com
                </span>
            </div>
        </div>
        
        <div class="tap-hint">Tap anywhere to claim this offer</div>
    </a>

</body>
</html>
