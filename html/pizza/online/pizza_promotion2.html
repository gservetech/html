<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
      Buy 1 Get 1 Free Large Pizza Deal | Royal King Restaurant Toronto
    </title>
    <meta
      name="description"
      content="Click to get 2 Large Pizzas, 2 Toppings, 2 Can Pop, and 1 Dip for only $29.99! Royal King Pasta & Sandwiches, 3450 Bathurst St, Toronto."
    />
    <link
      rel="canonical"
      href="https://www.royalkingon.com/offers/buy-one-get-one"
    />

    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://www.royalkingon.com/offers/buy-one-get-one"
    />
    <meta
      property="og:title"
      content="Royal King BOGO: 2 Large Pizzas for $29.99"
    />
    <meta
      property="og:description"
      content="TAP TO VIEW DEAL: 2 Large Pizzas, 2 Toppings, 2 Pops, and 1 Dip at Royal King Toronto."
    />
    <meta
      property="og:image"
      content="https://gservetech.github.io/html/html/pizza/Pizzeria.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="800" />

    <style>
      :root {
        --rk-red: #e62117;
        --rk-dark: #1a1a1a;
        --rk-cream: #fff9f0;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        background-color: var(--rk-cream);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        height: 100%;
      }

      /* This makes the whole page area clickable */
      .clickable-wrapper {
        text-decoration: none;
        color: inherit;
        display: block;
        cursor: pointer;
        min-height: 100vh;
      }

      header {
        background-color: var(--rk-red);
        color: white;
        padding: 20px 10px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      header h1 {
        margin: 0;
        font-size: 2.2rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      main {
        max-width: 900px;
        margin: 30px auto;
        padding: 0 15px;
        text-align: center;
      }

      .promo-container {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s ease;
      }

      /* Subtle lift effect when hovering on desktop */
      .promo-container:hover {
        transform: scale(1.01);
      }

      .promo-image {
        width: 100%;
        height: auto;
        display: block;
      }

      .cta-mimic {
        display: inline-block;
        background-color: var(--rk-red);
        color: white;
        padding: 15px 40px;
        font-size: 1.3rem;
        font-weight: bold;
        border-radius: 8px;
        margin: 25px 0;
        text-transform: uppercase;
        box-shadow: 0 4px 15px rgba(230, 33, 23, 0.3);
      }

      .details {
        margin: 20px 0;
        padding: 10px;
        text-align: center;
      }
      .details h2 {
        color: var(--rk-red);
        font-size: 2rem;
        margin-bottom: 10px;
      }
      .details p {
        font-size: 1.2rem;
        line-height: 1.5;
        margin: 5px 0;
      }

      footer {
        background-color: var(--rk-dark);
        color: white;
        padding: 30px 15px;
        text-align: center;
        font-size: 1rem;
      }

      @media (max-width: 600px) {
        header h1 {
          font-size: 1.8rem;
        }
        .details h2 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <a
      href="https://www.royalkingon.com/offers/buy-one-get-one"
      class="clickable-wrapper"
    >
      <main>
        <div class="promo-container">
          <img
            src="https://gservetech.github.io/html/html/pizza/Pizzeria.jpg"
            alt="Buy 1 Get 1 Free Pizza Deal - Click to Order"
            class="promo-image"
          />

          <div class="details">
            <h2>CLICK TO CLAIM BOGO DEAL</h2>
            <p><strong>2 LARGE PIZZAS + 2 TOPPINGS</strong></p>
            <p>2 Pops & 1 Dip Included — All for $29.99</p>
          </div>

          <div class="cta-mimic">
            ORDER ONLINE NOW
            <p>3450 Bathurst Street, Toronto, ON M6A 2C4</p>
            <p>Phone: 416-781-8383 | www.royalkingon.com</p>
           
          </div>
        </div>
      </main>
    </a>
  </body>
</html>
